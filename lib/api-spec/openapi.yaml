openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: AI Chat Application API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: conversations
    description: Chat conversation operations
  - name: messages
    description: Chat message operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "400":
          description: Validation error

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokens"
        "401":
          description: Invalid credentials

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      summary: Refresh JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshInput"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessToken"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      summary: List all conversations for current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

    post:
      operationId: createConversation
      tags: [conversations]
      summary: Create a new conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [conversations]
      summary: Get conversation with messages
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
        "404":
          description: Not found

    patch:
      operationId: updateConversation
      tags: [conversations]
      summary: Rename a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationUpdate"
      responses:
        "200":
          description: Updated conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

    delete:
      operationId: deleteConversation
      tags: [conversations]
      summary: Delete a conversation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /conversations/{id}/messages:
    post:
      operationId: sendMessage
      tags: [messages]
      summary: Send a message and get AI response
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "201":
          description: Message sent and AI response received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessagePair"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    User:
      type: object
      required: [id, email, username]
      properties:
        id:
          type: integer
        email:
          type: string
        username:
          type: string

    RegisterInput:
      type: object
      required: [email, username, password]
      properties:
        email:
          type: string
        username:
          type: string
        password:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RefreshInput:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string

    AuthTokens:
      type: object
      required: [access, refresh, user]
      properties:
        access:
          type: string
        refresh:
          type: string
        user:
          $ref: "#/components/schemas/User"

    AccessToken:
      type: object
      required: [access]
      properties:
        access:
          type: string

    Conversation:
      type: object
      required: [id, title, created_at, updated_at, message_count]
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        message_count:
          type: integer

    ConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string

    ConversationUpdate:
      type: object
      properties:
        title:
          type: string

    Message:
      type: object
      required: [id, role, content, created_at]
      properties:
        id:
          type: integer
        role:
          type: string
        content:
          type: string
        created_at:
          type: string

    ConversationDetail:
      type: object
      required: [id, title, created_at, updated_at, messages]
      properties:
        id:
          type: integer
        title:
          type: string
        created_at:
          type: string
        updated_at:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    MessagePair:
      type: object
      required: [user_message, assistant_message]
      properties:
        user_message:
          $ref: "#/components/schemas/Message"
        assistant_message:
          $ref: "#/components/schemas/Message"
