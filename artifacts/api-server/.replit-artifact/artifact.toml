kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd backend && python manage.py runserver 0.0.0.0:$PORT"

[services.production]

[services.production.build]
args = ["sh", "-c", "cd backend && python manage.py collectstatic --noinput"]

[services.production.run]
args = ["sh", "-c", "cd backend && gunicorn chatapi.wsgi:application --bind 0.0.0.0:$PORT --workers 2"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/api/healthz"
